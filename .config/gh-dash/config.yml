# yaml-language-server: $schema=https://gh-dash.dev/schema.json
defaults:
  issuesLimit: 20
  notificationsLimit: 20
  prApproveComment: LGTM
  preview:
    open: true
    width: 0.45
    height: 0.60
    position: auto
  prsLimit: 20
  refetchIntervalMinutes: 30
  view: prs
repoPaths:
  copelandsoftware/*: ~/Repos/*
keybindings:
  prs:
    - key: T
      command: >-
        tmux new-window '
          gh enhance -R {{.RepoName}} {{.PrNumber}}
        '
